<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1a0f1f"/>
  <rect x="16" y="16" width="480" height="480" rx="48" ry="48" fill="#251338" stroke="#5a3a72" stroke-width="6"/>

  <!-- Wordmark -->
  <g font-family="monospace, 'Courier New', Courier" font-weight="bold" text-anchor="middle">
    <text x="256" y="240" font-size="120" fill="#ffeecc">PISKA</text>
    <text x="256" y="284" font-size="22" fill="#bbb">PUZZLE</text>
  </g>

  <!-- 2x2 colored block cluster in the bottom-right corner. -->
  <g stroke="#000000" stroke-opacity="0.55" stroke-width="3">
    <rect x="312" y="332" width="72" height="72" fill="#e34b6e"/>
    <rect x="392" y="332" width="72" height="72" fill="#f5d24a"/>
    <rect x="312" y="412" width="72" height="72" fill="#4b8de3"/>
    <rect x="392" y="412" width="72" height="72" fill="#6ed058"/>
  </g>

  <!-- Bottom-left mini block accent. -->
  <g stroke="#000000" stroke-opacity="0.45" stroke-width="2">
    <rect x="48" y="412" width="48" height="48" fill="#a05ad6"/>
    <rect x="104" y="412" width="48" height="48" fill="#4ed8d8"/>
  </g>
</svg>
